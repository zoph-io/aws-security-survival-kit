AWSTemplateFormatVersion: "2010-09-09"
Transform: "AWS::Serverless-2016-10-31"
Description: aws-security-survival-kit alerting - global events - https://zoph.io
###########################################################
Parameters:
  ###########################################################
  AlarmRecipient:
    Type: String
    AllowedPattern: "^[\\x20-\\x45]?[\\w-\\+]+(\\.[\\w]+)*@[\\w-]+(\\.[\\w]+)*(\\.[a-z]{2,})$"
    ConstraintDescription: Email address required.
    Description: Alarm recipient email address
  Project:
    Type: String
    Description: Project Name
  EnableIamTrustPolicyDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for IAM UpdateAssumeRolePolicy. Off by default - can be noisy in environments where trust policies are managed by IaC.
  EnableOrganizationsDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for AWS Organizations tampering (DetachPolicy, DeletePolicy, LeaveOrganization). Only enable in the Organizations management (OrgAdmin) account.
  EnableSnsEncryption:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable SNS topic encryption at rest using a dedicated customer-managed KMS key (CMK). When true, a CMK is created and used for the alerting topic. Cost consideration applies (KMS key + per-API-call charges).
  TrustedAccountIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional list of AWS account IDs that should be allowed to use the dedicated SNS KMS CMK (cross-account publish). Only relevant when EnableSnsEncryption=true. Leave empty to restrict to this account only.
###############################################################################

###########################################################
Conditions:
  ###########################################################
  IamTrustPolicyDetectionEnabled: !Equals [!Ref EnableIamTrustPolicyDetection, "true"]
  OrganizationsDetectionEnabled: !Equals [!Ref EnableOrganizationsDetection, "true"]
  SnsEncryptionEnabled: !Equals [!Ref EnableSnsEncryption, "true"]
  HasTrustedAccountIds: !Not [!Equals [!Join ["", !Ref TrustedAccountIds], ""]]

###########################################################
Resources:
  ###########################################################

  EventsRuleRootSignIn:
    Type: AWS::Events::Rule
    Properties:
      Description: !Sub "[${Project}] Monitor root AWS Console sign-in events"
      EventPattern:
        detail-type:
          - AWS Console Sign In via CloudTrail
        detail:
          userIdentity:
            type:
              - Root
      Name:
        Fn::Sub: "${AWS::StackName}-RootActivityRule"
      State: ENABLED
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }

  EventRuleCTChange:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-cloudtrail-changes-global"
      Description: !Sub "[${Project}] Monitor change on CloudTrail setup"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "cloudtrail.amazonaws.com"
          eventName:
            - "StopLogging"
            - "DeleteTrail"
            - "UpdateTrail"

  EventRuleHealth:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-aws-health-events"
      Description: !Sub "[${Project}] Monitor AWS Health Dashboard events"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.lastUpdatedTime"
              EventName: "$.detail.eventTypeCode"
              EventAccountId: "$.account"
              EventRegion: "$.detail.eventRegion"
              EventDescription: "$.detail.eventDescription[0].latestDescription"
              Service: "$.detail.service"
              StatusCode: "$.detail.statusCode"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌏 EventRegion": <EventRegion>,
                "📄 EventDescription": <EventDescription>,
                "🔧 Service": <Service>,
                "⚠️ StatusCode": <StatusCode>
              }
      EventPattern:
        detail-type:
          - "AWS Health Event"
        source:
          - "aws.health"

  EventRuleIAMUsers:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-iam-user-changes"
      Description: !Sub "[${Project}] Monitor IAM Users changes"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "iam.amazonaws.com"
          eventName:
            - "AddUserToGroup"
            - "ChangePassword"
            - "CreateAccessKey"
            - "DeleteAccessKey"
            - "CreateUser"
            - "DeleteUser"
            - "UpdateAccessKey"
            - "UpdateGroup"
            - "UpdateUser"
            - "AttachGroupPolicy"
            - "AttachUserPolicy"
            - "DeleteUserPolicy"
            - "DetachGroupPolicy"
            - "DetachUserPolicy"
            - "PutUserPolicy"
            - "UpdateLoginProfile"

  EventRuleMFAChanges:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-iam-mfa-changes"
      Description: !Sub "[${Project}] Monitor MFA Changes"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "iam.amazonaws.com"
          eventName:
            - "CreateVirtualMFADevice"
            - "DeactivateMFADevice"
            - "DeleteVirtualMFADevice"
            - "EnableMFADevice"
            - "ResyncMFADevice"

  EventRuleAdminPolicyAttachment:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-admin-policy-attachment"
      Description: !Sub "[${Project}] Monitor AdministratorAccess policy attachments to roles, users, and groups"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
              PolicyArn: "$.detail.requestParameters.policyArn"
              RoleName: "$.detail.requestParameters.roleName"
              UserName: "$.detail.requestParameters.userName"
              GroupName: "$.detail.requestParameters.groupName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>,
                "📜 PolicyArn": <PolicyArn>,
                "👤 Principal (Role)": <RoleName>,
                "👤 Principal (User)": <UserName>,
                "👤 Principal (Group)": <GroupName>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "iam.amazonaws.com"
          eventName:
            - "AttachRolePolicy"
            - "AttachUserPolicy"
            - "AttachGroupPolicy"
          requestParameters:
            policyArn:
              - "arn:aws:iam::aws:policy/AdministratorAccess"

  EventRuleIamTrustPolicyChanges:
    Type: "AWS::Events::Rule"
    Condition: IamTrustPolicyDetectionEnabled
    Properties:
      Name: !Sub "${Project}-detect-iam-trust-policy-changes"
      Description: !Sub "[${Project}] Monitor IAM UpdateAssumeRolePolicy (trust policy changes, opt-in)"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
              RoleName: "$.detail.requestParameters.roleName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>,
                "👤 RoleName": <RoleName>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "iam.amazonaws.com"
          eventName:
            - "UpdateAssumeRolePolicy"

  EventRuleOrganizationsChanges:
    Type: "AWS::Events::Rule"
    Condition: OrganizationsDetectionEnabled
    Properties:
      Name: !Sub "${Project}-detect-organizations-changes"
      Description: !Sub "[${Project}] Monitor AWS Organizations tampering (DetachPolicy, DeletePolicy, LeaveOrganization) - opt-in, OrgAdmin account only"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
              PolicyId: "$.detail.requestParameters.policyId"
              TargetId: "$.detail.requestParameters.targetId"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>,
                "📜 PolicyId": <PolicyId>,
                "🎯 TargetId": <TargetId>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "organizations.amazonaws.com"
          eventName:
            - "DetachPolicy"
            - "DeletePolicy"
            - "DisablePolicyType"
            - "LeaveOrganization"
            - "RemoveAccountFromOrganization"

  EventRuleSelfProtection:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-self-stack-tampering-global"
      Description: !Sub "[${Project}] Detect tampering with ASSK CloudFormation stacks (DeleteStack, UpdateTerminationProtection) - global stack"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
              StackName: "$.detail.requestParameters.stackName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>,
                "📦 StackName": <StackName>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "cloudformation.amazonaws.com"
          eventName:
            - "DeleteStack"
            - "UpdateTerminationProtection"
          # CloudTrail records requestParameters.stackName as either the literal
          # stack name OR a full ARN, depending on how the caller invoked the API.
          # Match both forms via prefix + wildcard.
          requestParameters:
            stackName:
              - prefix: !Sub "${Project}-"
              - wildcard: !Sub "*:stack/${Project}-*"

  SnsCmk:
    Type: "AWS::KMS::Key"
    Condition: SnsEncryptionEnabled
    # Explicit Delete to honor `make tear-down`. KMS will still apply its standard
    # 7-30 day scheduled-deletion window, so accidental deletion remains recoverable.
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub "[${Project}] CMK for SNS alerting topic encryption (global stack)"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "EnableIAMUserPermissions"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: "AllowEventBridgeAndCloudWatchPublish"
            Effect: "Allow"
            Principal:
              Service:
                - "events.amazonaws.com"
                - "cloudwatch.amazonaws.com"
            Action:
              - "kms:GenerateDataKey*"
              - "kms:Decrypt"
            Resource: "*"
          - Sid: "AllowChatbotDecrypt"
            # AWS Chatbot needs kms:Decrypt to deliver encrypted SNS messages
            # to Slack/Teams. Without this, enabling SNS encryption silently
            # breaks Chatbot notifications.
            Effect: "Allow"
            Principal:
              Service: "chatbot.amazonaws.com"
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey*"
            Resource: "*"
          - !If
            - HasTrustedAccountIds
            - Sid: "AllowTrustedAccountsPublish"
              Effect: "Allow"
              Principal:
                AWS: !Ref TrustedAccountIds
              Action:
                - "kms:GenerateDataKey*"
                - "kms:Decrypt"
              Resource: "*"
            - !Ref "AWS::NoValue"
      Tags:
        - Key: "Project"
          Value: !Ref Project

  SnsCmkAlias:
    Type: "AWS::KMS::Alias"
    Condition: SnsEncryptionEnabled
    Properties:
      AliasName: !Sub "alias/${Project}-sns-global"
      TargetKeyId: !Ref SnsCmk

  CtAlertingTopic:
    # https://aws.amazon.com/premiumsupport/knowledge-center/cloudwatch-receive-sns-for-alarm-trigger/
    Type: "AWS::SNS::Topic"
    Properties:
      DisplayName: !Sub "[${AWS::AccountId}] Security Alarm"
      TopicName: !Sub "${Project}-alarm-topic-${AWS::Region}-global"
      KmsMasterKeyId: !If
        - SnsEncryptionEnabled
        - !Ref SnsCmk
        - !Ref "AWS::NoValue"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmRecipient
      Tags:
        - Key: "Project"
          Value: !Ref Project

  SnsTopicPolicy:
    Type: "AWS::SNS::TopicPolicy"
    Properties:
      PolicyDocument:
        Statement:
          # Read + publish only for in-account principals.
          # We intentionally do NOT grant sns:Subscribe via the topic policy:
          # a compromised in-account principal could otherwise add an attacker
          # email/HTTPS subscriber and silently exfiltrate every security alert.
          # Subscribing additional recipients still works via IAM-granted
          # sns:Subscribe (the legitimate admin flow).
          # Destructive actions (DeleteTopic, SetTopicAttributes, AddPermission,
          # RemovePermission) are likewise NOT granted here - they require IAM.
          - Sid: "__default_statement_ID"
            Effect: "Allow"
            Principal:
              AWS: "*"
            Action:
              - "sns:GetTopicAttributes"
              - "sns:ListSubscriptionsByTopic"
              - "sns:Publish"
              - "sns:Receive"
            Resource:
              Ref: CtAlertingTopic
            Condition:
              StringEquals:
                AWS:SourceOwner:
                  Ref: "AWS::AccountId"
          - Sid: "CWEvents"
            Effect: "Allow"
            Principal:
              Service: "events.amazonaws.com"
            Action: "sns:Publish"
            Resource:
              Ref: CtAlertingTopic
      Topics:
        - Ref: CtAlertingTopic

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "AWS-Security-Survival-Kit-Dashboard-Global"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "height": 6,
              "width": 24,
              "y": 0,
              "x": 0,
              "type": "metric",
              "properties": {
                "metrics": [
                  [ { "expression": "SEARCH('{AWS/Events,RuleName} MetricName=\"Invocations\"', 'Sum', 300)", "label": "EventBridge Rules Invocations", "id": "e1" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "Security Events Overview",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 6,
              "x": 0,
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/Events", "Invocations", "RuleName", "${AWS::StackName}-RootActivityRule", { "stat": "Sum", "period": 300 } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "Root Account Activity",
                "period": 300
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 6,
              "x": 12,
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/Events", "Invocations", "RuleName", "${Project}-detect-iam-user-changes", { "stat": "Sum", "period": 300 } ],
                  [ "AWS/Events", "Invocations", "RuleName", "${Project}-detect-iam-mfa-changes", { "stat": "Sum", "period": 300 } ],
                  [ "AWS/Events", "Invocations", "RuleName", "${Project}-detect-admin-policy-attachment", { "stat": "Sum", "period": 300 } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "IAM Changes",
                "period": 300
              }
            }
          ]
        }
