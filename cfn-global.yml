AWSTemplateFormatVersion: "2010-09-09"
Transform: "AWS::Serverless-2016-10-31"
Description: aws-security-survival-kit alerting - global events - https://zoph.io
###########################################################
Parameters:
  ###########################################################
  AlarmRecipient:
    Type: String
    AllowedPattern: "^[\\x20-\\x45]?[\\w-\\+]+(\\.[\\w]+)*@[\\w-]+(\\.[\\w]+)*(\\.[a-z]{2,})$"
    ConstraintDescription: Email address required.
    Description: Alarm recipient email address
  Project:
    Type: String
    Description: Project Name
  EnableIamTrustPolicyDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for IAM UpdateAssumeRolePolicy. Off by default - can be noisy in environments where trust policies are managed by IaC.
  EnableOrganizationsDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for AWS Organizations tampering (DetachPolicy, DeletePolicy, LeaveOrganization). Only enable in the Organizations management (OrgAdmin) account.
  EnableOrganizationsMembershipDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rules for AWS Organizations membership changes (AccountJoinedOrganization, AccountDepartedOrganization). Complements EnableOrganizationsDetection. Only enable in the Organizations management (OrgAdmin) account. Very low volume.
  EnableIamEnumerationDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for IAM enumeration / reconnaissance (GetAccountAuthorizationDetails, GenerateCredentialReport, GenerateOrganizationsAccessReport). Off by default - can be noisy in accounts running CSPM/IAM tooling.
  EnableSnsEncryption:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable SNS topic encryption at rest using a dedicated customer-managed KMS key (CMK). When true, a CMK is created and used for the alerting topic. Cost consideration applies (KMS key + per-API-call charges).
  TrustedAccountIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional list of AWS account IDs that should be allowed to use the dedicated SNS KMS CMK (cross-account publish). Only relevant when EnableSnsEncryption=true. Leave empty to restrict to this account only.
###############################################################################

###########################################################
Conditions:
  ###########################################################
  IamTrustPolicyDetectionEnabled: !Equals [!Ref EnableIamTrustPolicyDetection, "true"]
  OrganizationsDetectionEnabled: !Equals [!Ref EnableOrganizationsDetection, "true"]
  OrganizationsMembershipDetectionEnabled: !Equals [!Ref EnableOrganizationsMembershipDetection, "true"]
  IamEnumerationDetectionEnabled: !Equals [!Ref EnableIamEnumerationDetection, "true"]
  SnsEncryptionEnabled: !Equals [!Ref EnableSnsEncryption, "true"]
  HasTrustedAccountIds: !Not [!Equals [!Join ["", !Ref TrustedAccountIds], ""]]

###########################################################
Resources:
  ###########################################################

  EventsRuleRootSignIn:
    Type: AWS::Events::Rule
    Properties:
      Description: !Sub "[${Project}] Monitor root AWS Console sign-in events"
      EventPattern:
        detail-type:
          - AWS Console Sign In via CloudTrail
        detail:
          userIdentity:
            type:
              - Root
      Name:
        Fn::Sub: "${AWS::StackName}-RootActivityRule"
      State: ENABLED
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              "[ASSK] Security alert: <EventName>"
              ""
              "Event:     <EventName>"
              "Account:   <EventAccountId>"
              "Region:    <EventRegion>"
              "Time:      <EventTime>"
              "Source IP: <EventSourceIp>"
              "Principal: <EventBlame>"
              "Identity:  <EventBlameDetails>"
              "Event ID:  <EventId>"

  EventRuleCTChange:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-cloudtrail-changes-global"
      Description: !Sub "[${Project}] Monitor change on CloudTrail setup"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              "[ASSK] Security alert: <EventName>"
              ""
              "Event:     <EventName>"
              "Account:   <EventAccountId>"
              "Region:    <EventRegion>"
              "Time:      <EventTime>"
              "Source IP: <EventSourceIp>"
              "Principal: <EventBlame>"
              "Identity:  <EventBlameDetails>"
              "Event ID:  <EventId>"
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "cloudtrail.amazonaws.com"
          eventName:
            - "StopLogging"
            - "DeleteTrail"
            - "UpdateTrail"

