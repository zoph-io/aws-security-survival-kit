              "Event:             <EventName>"
              "Account:           <EventAccountId>"
              "Region:            <EventRegion>"
              "Time:              <EventTime>"
              "Source IP:         <EventSourceIp>"
              "Principal:         <EventBlame>"
              "Identity:          <EventBlameDetails>"
              "PolicyArn:         <PolicyArn>"
              "Principal (Role):  <RoleName>"
              "Principal (User):  <UserName>"
              "Principal (Group): <GroupName>"
              "Event ID:          <EventId>"
      EventPattern:
        detail-type:
