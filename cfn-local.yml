AWSTemplateFormatVersion: "2010-09-09"
Transform: "AWS::Serverless-2016-10-31"
Description: aws-security-survival-kit alerting - local events - https://zoph.io
###########################################################
Parameters:
  ###########################################################
  AlarmRecipient:
    Type: String
    AllowedPattern: "^[\\x20-\\x45]?[\\w-\\+]+(\\.[\\w]+)*@[\\w-]+(\\.[\\w]+)*(\\.[a-z]{2,})$"
    ConstraintDescription: Email address required.
    Description: Alarm recipient email address
  CTLogGroupName:
    Type: String
    Description: CloudTrail LogGroup
  Project:
    Type: String
    Description: Project Name
  Region:
    Type: String
    Description: AWS Region
  AccessDeniedThreshold:
    Type: Number
    Default: 25
    MinValue: 1
    Description: Threshold (per evaluation period) for the Unauthorized API Call alarm. Raised from the original value of 1 to reduce alert fatigue from legitimate AccessDenied noise (SCPs, eventual consistency, etc.).
  EnableS3PolicyDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for S3 bucket policy/ACL/PublicAccessBlock changes (PutBucketPolicy, DeleteBucketPolicy, PutBucketAcl, PutBucketPublicAccessBlock). Off by default - can be noisy in active environments.
  EnableLambdaDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for Lambda function creation, code updates, and permission grants. Off by default - can be noisy in environments deploying Lambdas frequently.
  EnableSSODetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for IAM Identity Center (SSO) permission set / account assignment changes. Off by default - only enable in the account and region of the SSO/Identity Center tenant.
  EnableNetworkInfrastructureDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable EventBridge rule for VPC peering, route table, and Internet Gateway changes. Off by default - extremely noisy in IaC-driven environments (Terraform/CDK route updates fire continuously).
  EnableGetCallerIdentityDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Enable EventBridge rule for sts:GetCallerIdentity calls. On by default for backward compatibility; STRONGLY consider disabling - this API is called by every AWS SDK init, every Terraform plan, etc. and dominates alert volume.
  EnableSecretsBatchGetDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Enable EventBridge rule for SecretsManager BatchGetSecretValue calls. On by default for backward compatibility; consider disabling if you have ECS/Lambda/EKS workloads that legitimately batch-load secrets at startup.
  EnableEc2PasswordDataDetection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Enable EventBridge rule for ec2:GetPasswordData calls. On by default for backward compatibility; consider disabling in Windows fleets where SSM/admin tools call this routinely.
  EnableSnsEncryption:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable SNS topic encryption at rest using a dedicated customer-managed KMS key (CMK). When true, a CMK is created and used for the alerting topic. Cost consideration applies (KMS key + per-API-call charges).
  TrustedAccountIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional list of AWS account IDs that should be allowed to use the dedicated SNS KMS CMK (cross-account publish). Only relevant when EnableSnsEncryption=true. Leave empty to restrict to this account only.

###############################################################################

###########################################################
Conditions:
  ###########################################################
  S3PolicyDetectionEnabled: !Equals [!Ref EnableS3PolicyDetection, "true"]
  LambdaDetectionEnabled: !Equals [!Ref EnableLambdaDetection, "true"]
  SSODetectionEnabled: !Equals [!Ref EnableSSODetection, "true"]
  NetworkInfrastructureDetectionEnabled: !Equals [!Ref EnableNetworkInfrastructureDetection, "true"]
  GetCallerIdentityDetectionEnabled: !Equals [!Ref EnableGetCallerIdentityDetection, "true"]
  SecretsBatchGetDetectionEnabled: !Equals [!Ref EnableSecretsBatchGetDetection, "true"]
  Ec2PasswordDataDetectionEnabled: !Equals [!Ref EnableEc2PasswordDataDetection, "true"]
  SnsEncryptionEnabled: !Equals [!Ref EnableSnsEncryption, "true"]
  HasTrustedAccountIds: !Not [!Equals [!Join ["", !Ref TrustedAccountIds], ""]]

###########################################################
Resources:
  ###########################################################

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "AWS-Security-Survival-Kit-Dashboard-${AWS::Region}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "height": 6,
              "width": 12,
              "y": 0,
              "x": 0,
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "CloudTrailMetrics", "UnauthorizedAttemptCount", { "stat": "Sum", "period": 300 } ]
                ],
                "region": "${Region}",
                "title": "Access Denied Events (5min)",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 0,
              "x": 12,
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "CloudTrailMetrics", "ConsoleLoginFailures", { "stat": "Sum", "period": 300 } ],
                  [ "CloudTrailMetrics", "IMDSv1RunInstance", { "stat": "Sum", "period": 300 } ]
                ],
                "region": "${Region}",
                "title": "Security Events Overview",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "height": 6,
              "width": 24,
              "y": 6,
              "x": 0,
              "type": "log",
              "properties": {
                "query": "SOURCE '${CTLogGroupName}' | fields eventTime, eventName, eventSource, recipientAccountId as Account, userIdentity.sessionContext.sessionIssuer.userName as Principal, userIdentity.invokedBy as InvokedBy, errorCode, errorMessage\n | filter errorCode like /(Client.UnauthorizedOperation|AccessDenied)/\n | sort eventTime desc\n | limit 10",
                "region": "${Region}",
                "title": "Latest Access Denied Events",
                "view": "table"
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 12,
              "x": 0,
              "type": "log",
              "properties": {
                "query": "SOURCE '${CTLogGroupName}' | fields eventTime, eventName, eventSource, userIdentity.sessionContext.sessionIssuer.userName as Principal, userIdentity.invokedBy as InvokedBy, responseElements.instancesSet.items.0.metadataOptions.httpTokens as IMDSv2\n | filter eventName like \"RunInstances\" and IMDSv2 like \"optional\"\n | sort eventTime desc\n | limit 5",
                "region": "${Region}",
                "title": "Recent IMDSv1 Instance Launches",
                "view": "table"
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 12,
              "x": 12,
              "type": "log",
              "properties": {
                "query": "SOURCE '${CTLogGroupName}' | fields eventTime, eventName, eventSource, userIdentity.sessionContext.sessionIssuer.userName as Principal\n | filter eventSource = \"cloudtrail.amazonaws.com\" and eventName in ['StopLogging', 'DeleteTrail', 'UpdateTrail']\n | sort eventTime desc\n | limit 5",
                "region": "${Region}",
                "title": "CloudTrail Changes",
                "view": "table"
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 18,
              "x": 0,
              "type": "log",
              "properties": {
                "query": "SOURCE '${CTLogGroupName}' | fields eventTime, eventName, eventSource, userIdentity.sessionContext.sessionIssuer.userName as Principal\n | filter eventSource = \"kms.amazonaws.com\" and eventName in ['DisableKey', 'ScheduleKeyDeletion', 'DeleteAlias', 'DisableKeyRotation']\n | sort eventTime desc\n | limit 5",
                "region": "${Region}",
                "title": "KMS Key Changes",
                "view": "table"
              }
            },
            {
              "height": 6,
              "width": 12,
              "y": 18,
              "x": 12,
              "type": "log",
              "properties": {
                "query": "SOURCE '${CTLogGroupName}' | fields eventTime, eventName, eventSource, userIdentity.sessionContext.sessionIssuer.userName as Principal\n | filter eventSource = \"ec2.amazonaws.com\" and eventName in ['DeleteFlowLogs', 'ModifyFlowLogs']\n | sort eventTime desc\n | limit 5",
                "region": "${Region}",
                "title": "VPC Flow Logs Changes",
                "view": "table"
              }
            }
          ]
        }

  EventRuleCTChange:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-cloudtrail-changes"
      Description: !Sub "[${Project}] Monitor change on CloudTrail setup"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            # Doc: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-events-rule-inputtransformer.html
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "cloudtrail.amazonaws.com"
          eventName:
            - "StopLogging"
            - "DeleteTrail"
            - "UpdateTrail"

  EventRuleExfilDisk:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-disk-exfiltration"
      Description: !Sub "[${Project}] Detect exfiltration on EBS Snapshot or AMI (sharing)"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "ec2.amazonaws.com"
          eventName:
            - "ModifySnapshotAttribute"
            - "ModifyImageAttribute"
            - "SharedSnapshotCopyInitiated"
            - "SharedSnapshotVolumeCreated"

  EventRuleStsWhoAmI:
    Type: "AWS::Events::Rule"
    Condition: GetCallerIdentityDetectionEnabled
    Properties:
      Name: !Sub "${Project}-detect-sts-whoami"
      Description: !Sub "[${Project}] Detect STS get-caller-identity"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        source:
          - aws.sts
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "sts.amazonaws.com"
          eventName:
            - "GetCallerIdentity"

  EventRuleCloudShellGetFileDownloadUrls:
    # Can detect data exfil through CloudShell (ie: scrape and download credentials stored in Secrets Manager)
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-cloudshell-getfiledownloadurls"
      Description: !Sub "[${Project}] Detect CloudShell GetFileDownloadUrls"
      State: "ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              FilePath: "$.detail.requestParameters.FileDownloadPath"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "📂 FilePath": <FilePath>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>
              }
      EventPattern:
        source:
          - aws.cloudshell
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "cloudshell.amazonaws.com"
          eventName:
            - "GetFileDownloadUrls"

  CloudWatchLogsMetricsFilterAccessDenied:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '{ ($.errorCode = "*UnauthorizedOperation") || ($.errorCode = "AccessDenied*") }'
      LogGroupName: !Ref CTLogGroupName
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: "CloudTrailMetrics"
          MetricName: "UnauthorizedAttemptCount"
          DefaultValue: 0

  AlarmAccessDenied:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      ActionsEnabled: true
      AlarmName: !Sub "Unauthorized API Call [${Project}]"
      AlarmActions:
        - !Ref CtAlertingTopic
      AlarmDescription: >
        Alarm on Unauthorized API Call - threshold configurable via AccessDeniedThreshold parameter (default 25 to reduce noise from legitimate AccessDenied events such as SCP blocks and eventual consistency).
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 2
      MetricName: "UnauthorizedAttemptCount"
      Namespace: "CloudTrailMetrics"
      Period: 3600
      Statistic: Sum
      Threshold: !Ref AccessDeniedThreshold
      TreatMissingData: "notBreaching"

  AlarmConsoleFailedAuth:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName: !Sub "Failed Console Login [${Project}]"
      AlarmDescription: !Sub "Failed Console Login [${Project}]"
      MetricName: "ConsoleLoginFailures"
      Namespace: "CloudTrailMetrics"
      Statistic: "Sum"
      Period: "300"
      EvaluationPeriods: "1"
      Threshold: "1"
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Ref CtAlertingTopic
      TreatMissingData: "notBreaching"

  CloudWatchLogsMetricsFilterConsoleFailedAuth:
    Type: "AWS::Logs::MetricFilter"
    Properties:
      LogGroupName: !Ref CTLogGroupName
      FilterPattern: '{ ($.eventName = ConsoleLogin) && ($.errorMessage = "Failed authentication") }'
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: "CloudTrailMetrics"
          MetricName: "ConsoleLoginFailures"

  AlarmIMDSv1RunInstance:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName: !Sub "IMDSv1 RunInstance Detected [${Project}]"
      AlarmDescription: !Sub "IMDSv1 RunInstance Detected [${Project}]"
      MetricName: "IMDSv1RunInstance"
      Namespace: "CloudTrailMetrics"
      Statistic: "Sum"
      Period: "300"
      EvaluationPeriods: "1"
      Threshold: "1"
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Ref CtAlertingTopic
      TreatMissingData: "notBreaching"

  CloudWatchLogsMetricsFilterIMDSv1:
    Type: "AWS::Logs::MetricFilter"
    Properties:
      LogGroupName: !Ref CTLogGroupName
      FilterPattern: '{ ($.eventName = RunInstances) && ($.responseElements.instancesSet.items[0].metadataOptions.httpTokens = "optional") }'
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: "CloudTrailMetrics"
          MetricName: "IMDSv1RunInstance"

  EventRuleKMSKeyChanges:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-kms-key-changes"
      Description: !Sub "[${Project}] Monitor KMS key deletions and disabling"
      State: "ENABLED"
      Targets:
        - Arn:
            Ref: CtAlertingTopic
          Id: CtAlertingTopic
          InputTransformer:
            InputPathsMap:
              EventId: "$.id"
              EventTime: "$.detail.eventTime"
              EventName: "$.detail.eventName"
              EventAccountId: "$.account"
              EventSourceIp: "$.detail.sourceIPAddress"
              EventRegion: "$.region"
              EventBlame: "$.detail.userIdentity.principalId"
              EventBlameDetails: "$.detail.userIdentity.sessionContext.sessionIssuer.userName"
              KeyId: "$.detail.requestParameters.keyId"
            InputTemplate: |
              {
                "🆔 EventId": <EventId>,
                "🕑 EventTime": <EventTime>,
                "👉 EventName": <EventName>,
                "🧾 EventAccountId": <EventAccountId>,
                "🌐 EventSourceIp": <EventSourceIp>,
                "🌏 EventRegion": <EventRegion>,
                "👨‍🏭 EventBlame": <EventBlame>,
                "📃 EventBlameDetails": <EventBlameDetails>,
                "🔑 KeyId": <KeyId>
              }
      EventPattern:
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "kms.amazonaws.com"
          eventName:
            - "DisableKey"
            - "ScheduleKeyDeletion"
            - "DeleteAlias"
            - "DisableKeyRotation"

  EventRuleVPCFlowLogs:
    Type: "AWS::Events::Rule"
    Properties:
      Name: !Sub "${Project}-detect-flow-logs-changes"
      Description: !Sub "[${Project}] Monitor VPC Flow Logs deletion or modification"
      State: "ENABLED"
