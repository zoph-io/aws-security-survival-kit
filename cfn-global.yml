              ""
              "Event:     <EventName>"
              "Account:   <EventAccountId>"
              "Region:    <EventRegion>"
              "Time:      <EventTime>"
              "Source IP: <EventSourceIp>"
              "Principal: <EventBlame>"
              "Identity:  <EventBlameDetails>"
              "Event ID:  <EventId>"
      # Match on source + eventName only: these may surface as either
